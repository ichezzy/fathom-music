name: Release Windows installer

# Builds the NSIS installer on a Windows runner and publishes it (plus the
# latest.yml auto-update feed) to a GitHub Release whenever a version tag is
# pushed, e.g. `git tag v0.2.0 && git push origin v0.2.0`.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish installer
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
